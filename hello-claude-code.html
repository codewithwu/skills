<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, Claude Code!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #1a1814;
            --bg-surface: #242019;
            --text-primary: #f4efe6;
            --text-secondary: #a39b8b;
            --accent: #d4a574;
            --accent-glow: rgba(212, 165, 116, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            font-family: 'Source Sans 3', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 70% 100%, rgba(212, 165, 116, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--text-primary);
            position: relative;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .greeting span {
            display: inline-block;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting::after {
            content: '';
            position: absolute;
            bottom: -0.15em;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: lineReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        .subtitle {
            font-family: 'Source Sans 3', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid var(--accent-glow);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .decoration-1 {
            top: -100px;
            right: -80px;
            animation: fadeIn 1.5s ease 0.8s forwards;
        }

        .decoration-2 {
            bottom: -120px;
            left: -100px;
            width: 250px;
            height: 250px;
            animation: fadeIn 1.5s ease 1s forwards;
        }

        .corner-mark {
            position: fixed;
            width: 40px;
            height: 40px;
            border-color: var(--text-secondary);
            border-style: solid;
            opacity: 0;
            animation: fadeIn 1s ease 1.2s forwards;
        }

        .corner-mark.tl {
            top: 30px;
            left: 30px;
            border-width: 1px 0 0 1px;
        }

        .corner-mark.tr {
            top: 30px;
            right: 30px;
            border-width: 1px 1px 0 0;
        }

        .corner-mark.bl {
            bottom: 30px;
            left: 30px;
            border-width: 0 0 1px 1px;
        }

        .corner-mark.br {
            bottom: 30px;
            right: 30px;
            border-width: 0 1px 1px 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes lineReveal {
            from { transform: translateX(-50%) scaleX(0); }
            to { transform: translateX(-50%) scaleX(1); }
        }
    </style>
</head>
<body>
    <div class="corner-mark tl"></div>
    <div class="corner-mark tr"></div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>

    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>

    <div class="container">
        <h1 class="greeting"><span>Hello, Claude Code!</span></h1>
        <p class="subtitle">Welcome to the future of coding</p>
    </div>
</body>
</html>
